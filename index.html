<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindMesh AI | Study Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background-color: #0d1117; 
            color: #c9d1d9; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }
        .chat-container { 
            width: 100%; 
            max-width: 750px; 
            background-color: #161b22; 
            border: 1px solid #30363d;
            border-radius: 12px; 
            padding: 25px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.8); 
            display: flex;
            flex-direction: column;
            height: 90vh;
        }
        h2 { margin-top: 0; text-align: center; background: linear-gradient(90deg, #58a6ff, #bc8cff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.8rem; }
        .tagline { text-align: center; font-size: 0.9rem; color: #8b949e; margin-bottom: 20px; }
        .chat-box { 
            flex: 1; 
            overflow-y: auto; 
            margin-bottom: 20px; 
            padding: 15px; 
            background-color: #0d1117; 
            border: 1px solid #30363d;
            border-radius: 8px; 
            scroll-behavior: smooth;
        }
        .message { margin-bottom: 15px; padding: 16px; border-radius: 8px; line-height: 1.6; font-size: 0.95rem; }
        .user-msg { background-color: #238636; color: #ffffff; margin-left: auto; width: fit-content; max-width: 80%; }
        .ai-msg { background-color: #21262d; border: 1px solid #30363d; width: fit-content; max-width: 90%; }
        
        /* Markdown Styling Rules */
        .ai-msg h3 { margin-top: 0; color: #58a6ff; }
        .ai-msg p { margin-top: 0; }
        .ai-msg strong { color: #ffffff; }
        .ai-msg pre { background-color: #0d1117; padding: 10px; border-radius: 6px; overflow-x: auto; border: 1px solid #30363d; }
        .ai-msg code { font-family: monospace; color: #ff7b72; background-color: rgba(255,123,114,0.1); padding: 2px 4px; border-radius: 4px; }
        .node-badge { font-size: 0.8rem; color: #8b949e; margin-bottom: 8px; font-weight: bold; border-bottom: 1px solid #30363d; padding-bottom: 4px;}

        .input-area { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 15px; border: 1px solid #30363d; border-radius: 8px; background-color: #0d1117; color: #c9d1d9; outline: none; font-size: 1rem; }
        input[type="text"]:focus { border-color: #58a6ff; }
        button { padding: 15px 25px; border: none; border-radius: 8px; background-color: #58a6ff; color: #0d1117; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        button:hover { background-color: #79c0ff; }
    </style>
</head>
<body>

    <div class="chat-container">
        <h2>MindMesh AI</h2>
        <div class="tagline">Advanced Learning Systems</div>
        <div class="chat-box" id="chat-box">
            <div class="message ai-msg">
                <div class="node-badge">⚙️ System Core</div>
                Initialization complete. I am MindMesh. How can I assist you with your studies today?
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ask a complex question..." onkeypress="handleEnter(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // ⚠️ WARNING: PASTE YOUR RENDER URL ON THE LINE BELOW (Keep the /ask)
        const BACKEND_URL = "https://mindmesh-ai.onrender.com/ask"; 

        async function sendMessage() {
            const inputField = document.getElementById("user-input");
            const chatBox = document.getElementById("chat-box");
            const message = inputField.value.trim();

            if (!message) return;

            chatBox.innerHTML += `<div class="message user-msg">${message}</div>`;
            inputField.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            const thinkingId = "thinking-" + Date.now();
            chatBox.innerHTML += `<div class="message ai-msg" id="${thinkingId}"><em>Thinking...</em></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(BACKEND_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        question: message,
                        is_complex: message.length > 100 
                    })
                });
                
                const data = await response.json();
                
                // Convert Markdown to HTML
                const formattedAnswer = marked.parse(data.answer);
                
                document.getElementById(thinkingId).innerHTML = `
                    <div class="node-badge">${data.node}</div>
                    ${formattedAnswer}
                `;
            } catch (error) {
                document.getElementById(thinkingId).innerHTML = `
                    <div class="node-badge">⚠️ Error</div>
                    Connection lost. Please ensure the MindMesh backend is running.
                `;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleEnter(event) {
            if (event.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
